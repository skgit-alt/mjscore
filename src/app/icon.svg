<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>

  <!-- 3D Cube - top face -->
  <polygon points="16,4 27,10 16,16 5,10" fill="#4a9e5c"/>
  <!-- 3D Cube - left face -->
  <polygon points="5,10 16,16 16,28 5,22" fill="#2d6e3d"/>
  <!-- 3D Cube - right face -->
  <polygon points="27,10 16,16 16,28 27,22" fill="#1a4a2a"/>

  <!-- MJ text on top face (rotated to fit cube perspective) -->
  <text x="16" y="13.5" font-family="Georgia, serif" font-size="5.5" font-weight="bold"
    fill="#ffffff" text-anchor="middle" letter-spacing="0.5">MJ</text>
</svg>
